    25-85-1.9:   { nprob: 25,85,   epsilon: 1.9 }
    35-120-1.9:  { nprob: 35,120,  epsilon: 1.9 }
    50-170-1.9:  { nprob: 50,170,  epsilon: 1.9 }
    70-230-1.9:  { nprob: 70,230,  epsilon: 1.9 }
    90-300-1.9:  { nprob: 90,300,  epsilon: 1.9 }
