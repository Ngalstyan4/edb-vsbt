  datasetType: parquet
  metric: cos
  samplingFactor: 256
  lists: [140, 12000]
  build_threads: 32
  residual_quantization: true
  kmeans_hierarchical: true
  rerank_in_table: true
  pg_parallel_workers: 32
  top: 10
  benchmarks:
