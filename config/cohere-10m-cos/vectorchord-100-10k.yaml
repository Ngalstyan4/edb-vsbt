vc-cohere-10m-100-10k:
  dataset: cohere-10m-cos
  datasetType: parquet
  metric: cos
  samplingFactor: 256
  lists: [100, 10000]
  build_threads: 32
  residual_quantization: true
  kmeans_hierarchical: true
  rerank_in_table: true
  pg_parallel_workers: 32
  top: 10
  benchmarks:
    13-44-1.9:
      nprob: 13,44
      epsilon: 1.9
    22-75-1.9:
      nprob: 22,75
      epsilon: 1.9
    30-100-1.9:
      nprob: 30,100
      epsilon: 1.9
    44-150-1.9:
      nprob: 44,150
      epsilon: 1.9
    60-200-1.9:
      nprob: 60,200
      epsilon: 1.9
