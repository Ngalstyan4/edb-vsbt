# copied over from ../laion-5m-test-ip/vectorchord-190-35k.yaml
# kept parameters with addition of rerank_in_table:true
# of course, changed dataset to openai
vc-openai-1536-5m-190-35k:
  dataset: openai-5m-cos
  datasetType: hdf5
  metric: dot
  samplingFactor: 256
  lists: [190, 35000]
  build_threads: 32
  residual_quantization: true
  kmeans_hierarchical: true
  rerank_in_table: true
  pg_parallel_workers: 32
  top: 10
  benchmarks:
    80-160-1.9:
      nprob: 80,160
      epsilon: 1.9
    80-190-1.9:
      nprob: 80,190
      epsilon: 1.9
    80-250-1.9:
      nprob: 80,250
      epsilon: 1.9
