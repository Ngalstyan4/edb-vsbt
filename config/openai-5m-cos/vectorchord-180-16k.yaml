vc-openai-5m-180-16k:
  dataset: openai-5m-cos
  datasetType: parquet
  metric: cos
  samplingFactor: 256
  lists: [180, 16384]
  build_threads: 32
  residual_quantization: true
  kmeans_hierarchical: true
  rerank_in_table: true
  pg_parallel_workers: 32
  top: 10
  benchmarks:
    20-65-1.9:   { nprob: 20,65,   epsilon: 1.9 }
    30-100-1.9:  { nprob: 30,100,  epsilon: 1.9 }
    44-150-1.9:  { nprob: 44,150,  epsilon: 1.9 }
    60-200-1.9:  { nprob: 60,200,  epsilon: 1.9 }
    80-260-1.9:  { nprob: 80,260,  epsilon: 1.9 }
    100-330-1.9: { nprob: 100,330, epsilon: 1.9 }
